<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Twitch Minigames</title>
  </head>
  <body style="text-align: center; padding: 0; border: 0; margin: 0;">
	  <div id="unity-container" class="unity-desktop">
		<div id="unity-loading-bar" style="display: block; height:100px;position: relative;width: 100%;position: ;">
			<div id="unity-logo"></div>
			<div id="unity-progress-bar-empty" style="height:100px; width = 100px;background-color: aqua;">
			  <div id="unity-progress-bar-full" style="width: 100%; height:100%; background-color:red;"></div>
			</div>
		  </div>
		  <div id="unity-warning"> </div>
		</div>
		  <canvas id="unity-canvas" style="background: transparent;" width=1152 height=720 tabindex="-1" style="width: 100%; height: 100%; background: #231F20"></canvas>
    <script src="Build/testweb.loader.js"></script>
    <script>
  
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        var canvas = document.querySelector("#unity-canvas");

        document.body.style.textAlign = "left";

      }

      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/testweb.data",
        frameworkUrl: "Build/testweb.framework.js",
        codeUrl: "Build/testweb.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Twitch Minigames",
        productVersion: "0.1.0",
        matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
        // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
      },(progress)=>
	  {
	  console.log(progress);
		document.querySelector("#unity-loading-bar").style.display = "block";
		document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
	  }).then((unityInstance) => {
                document.querySelector("#unity-loading-bar").style.display = "none";
      }).catch((message) => {
        alert(message);
      });

		function onResize() {
            var ccanvas = document.querySelector("#unity-canvas");
			let width = window.innerWidth;
			let height = window.innerHeight;
            let ratio = 16/10;
            if(width < (height * ratio))
            {
                height = width * 1/ratio;
            }
            else
            {
                width = height * ratio;
            }
			ccanvas.width = width;
			ccanvas.height = height;
			ccanvas.style.width = width + 'px';
			ccanvas.style.height = height + 'px';
		}
		window.addEventListener('resize', onResize);
		onResize();
    </script>
  </body>
</html>
